<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>banana — books</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      text-transform: lowercase;
    }

    :root {
      --font: 'DM Sans', sans-serif;
      --bg: #f9f8f6;
      --surface: #ffffff;
      --border: #e4e2dc;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b66;
      --text-muted: #a8a8a2;
      --books-bg: #fad9f5;
      --books-text: #c95bb9;
      --btn-add-bg: #faf07f;
      --btn-add-text: #82643b;
      
      /* status colors */
      --reading-bg: #dcf2ae; --reading-text: #5e9945;
      --finished-bg: #b1fcf4; --finished-text: #45998f;
      --want-bg: #fad9f5;     --want-text: #c95bb9;
      --dropped-bg: #f1f1ef;  --dropped-text: #6b6b66;
    }

    html { font-family: var(--font); background: var(--bg); color: var(--text-primary); font-size: 15px; line-height: 1.6; }
    body { min-height: 100vh; padding-bottom: 80px; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky; top: 0; z-index: 10;
    }
    .nav-logo { font-size: 18px; font-weight: 700; color: var(--text-primary); text-decoration: none; letter-spacing: -0.5px; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { font-size: 13px; color: var(--text-secondary); text-decoration: none; transition: color .15s; }
    .nav-links a:hover { color: var(--text-primary); }
    .back-link { display: inline-block; font-size: 13px; color: var(--text-secondary); text-decoration: none; transition: color .15s; margin-bottom: 1.5rem; }
    .back-link:hover { color: var(--text-primary); }

    .page { max-width: 780px; margin: 0 auto; padding: 2.5rem 2rem; }

    .section-header { margin-bottom: 2rem; }
    .section-label {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
      background: var(--books-bg); color: var(--books-text);
    }
    .section-header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.75px; margin-bottom: 4px; }
    .section-header p { font-size: 14px; color: var(--text-secondary); }

    .header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 1.5rem; }

    .stats {
      display: flex; gap: 24px; flex-wrap: wrap;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .stat-num { font-size: 20px; font-weight: 700; }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .controls input, .controls select {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 12px;
      color: var(--text-primary); font-family: var(--font); font-size: 13px;
      outline: none; cursor: pointer; transition: border-color .15s;
    }
    .controls input { flex-grow: 1; min-width: 140px; cursor: text; }
    .controls input:focus, .controls select:focus { border-color: #c8c6c0; }
    .controls input::placeholder { color: var(--text-muted); }

    .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .pill {
      font-size: 11px; font-weight: 700; padding: 4px 12px;
      border-radius: 20px; border: 1px solid var(--border);
      color: var(--text-secondary); background: var(--surface);
      font-family: var(--font); cursor: pointer; transition: all .15s;
      text-transform: lowercase;
    }
    .pill:hover { border-color: #c8c6c0; color: var(--text-primary); }
    .pill.active { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }

    .book-list { display: flex; flex-direction: column; gap: 8px; }

    .book-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.25rem;
      display: flex; gap: 14px; align-items: center;
      transition: border-color .15s, transform .1s;
    }
    .book-card:hover { border-color: #c8c6c0; transform: translateY(-1px); }

    .ring-bg  { fill: none; stroke: #eeece8; }
    .ring-fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset .5s ease; }

    .book-info { flex: 1; min-width: 0; }
    .book-title { font-weight: 700; font-size: 14px; color: var(--text-primary); }
    .book-author { font-size: 12px; color: var(--text-muted); margin-left: 7px; }
    .book-meta { display: flex; gap: 7px; margin-top: 5px; flex-wrap: wrap; align-items: center; }

    .tag {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 2px 9px; border-radius: 20px; text-transform: lowercase;
    }
    .tag-reading  { background: var(--reading-bg);  color: var(--reading-text); }
    .tag-finished { background: var(--finished-bg); color: var(--finished-text); }
    .tag-want     { background: var(--want-bg);     color: var(--want-text); }
    .tag-dropped  { background: var(--dropped-bg);  color: var(--dropped-text); }

    .book-genre, .book-pages { font-size: 11px; color: var(--text-muted); }
    .book-notes { font-size: 12px; color: var(--text-muted); font-style: italic; margin-top: 4px; }

    .book-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-sm {
      background: transparent; border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 10px; color: var(--text-muted); font-family: var(--font);
      font-size: 11px; cursor: pointer; transition: all .15s; text-transform: lowercase;
    }
    .btn-sm:hover { color: var(--text-primary); border-color: #c8c6c0; }
    .btn-sm.del:hover { color: #c0392b; border-color: #c0392b; }

    .empty { text-align: center; color: var(--text-muted); padding: 50px 0; font-size: 13px; }

    .btn-add {
      background: var(--btn-add-bg); color: var(--btn-add-text);
      border: none; border-radius: 8px; padding: 9px 18px;
      font-family: var(--font); font-weight: 700; font-size: 12px;
      cursor: pointer; transition: opacity .15s; white-space: nowrap;
      text-transform: lowercase;
    }
    .btn-add:hover { opacity: .8; }

    .overlay {
      position: fixed; inset: 0; background: rgba(26,26,24,.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px;
      width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
      transform: translateY(10px); transition: transform .2s;
    }
    .overlay.open .modal { transform: translateY(0); }

    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--text-primary); }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; letter-spacing: 0.2px; }
    .field input, .field select, .field textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 11px;
      color: var(--text-primary); font-family: var(--font); font-size: 13px;
      outline: none; transition: border-color .15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: #c8c6c0; }
    .field textarea { resize: vertical; }
    .field input[type="range"] { padding: 0; border: none; background: transparent; accent-color: var(--btn-add-text); }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
    .btn-submit {
      flex: 1; background: var(--btn-add-bg); color: var(--btn-add-text);
      border: none; border-radius: 8px; padding: 10px;
      font-family: var(--font); font-weight: 700; font-size: 13px;
      cursor: pointer; transition: opacity .15s; text-transform: lowercase;
    }
    .btn-submit:hover { opacity: .8; }
    .btn-cancel {
      background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 16px; font-family: var(--font);
      font-size: 13px; cursor: pointer; text-transform: lowercase;
    }
    .btn-cancel:hover { border-color: #c8c6c0; }

    @media (max-width: 500px) {
      .page { padding: 1.5rem 1.25rem; }
      nav { padding: 1rem 1.25rem; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">banana.</a>
  <div class="nav-links">
    <a href="index.html">casita</a>
  </div>
</nav>

<div class="page">

  <a href="index.html" class="back-link">← back</a>

  <div class="header-row">
    <div class="section-header" style="margin-bottom:0">
      <span class="section-label">books</span>
      <h1>books & reading</h1>
      <p>reading list, notes, quotes, and books finished.</p>
    </div>
    <button class="btn-add" onclick="openModal()" style="margin-top:18px">+ add book</button>
  </div>

  <div class="stats">
    <div><div class="stat-num" id="stat-total">0</div><div class="stat-label">total</div></div>
    <div><div class="stat-num" id="stat-finished">0</div><div class="stat-label">finished</div></div>
    <div><div class="stat-num" id="stat-reading">0</div><div class="stat-label">reading</div></div>
    <div><div class="stat-num" id="stat-pages">0</div><div class="stat-label">pages read</div></div>
  </div>

  <div class="controls">
    <input type="text" id="search-input" placeholder="search title or author..." oninput="render()" />
    <select id="sort-select" onchange="render()">
      <option value="dateAdded">newest</option>
      <option value="title">title a–z</option>
      <option value="progress">progress</option>
    </select>
  </div>

  <div class="filters">
    <button class="pill active" data-filter="all" onclick="setFilter(this)">all</button>
    <button class="pill" data-filter="reading" onclick="setFilter(this)">reading</button>
    <button class="pill" data-filter="finished" onclick="setFilter(this)">finished</button>
    <button class="pill" data-filter="want to read" onclick="setFilter(this)">want to read</button>
    <button class="pill" data-filter="dropped" onclick="setFilter(this)">dropped</button>
  </div>

  <div class="book-list" id="book-list"></div>

</div>

<!-- modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 id="modal-title">add a book</h2>

    <div class="field">
      <label>title *</label>
      <input type="text" id="f-title" placeholder="book title" />
    </div>
    <div class="field">
      <label>author</label>
      <input type="text" id="f-author" placeholder="author name" />
    </div>
    <div class="field-row">
      <div class="field">
        <label>genre</label>
        <select id="f-genre">
          <option>fiction</option><option>nonfiction</option><option>memoir</option>
          <option>sci-fi</option><option>fantasy</option><option>mystery</option>
          <option>romance</option><option>history</option><option>self-help</option>
          <option>poetry</option><option>nursing</option><option>other</option>
        </select>
      </div>
      <div class="field">
        <label>status</label>
        <select id="f-status">
          <option value="want to read">want to read</option>
          <option value="reading">reading</option>
          <option value="finished">finished</option>
          <option value="dropped">dropped</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>total pages</label>
      <input type="number" id="f-pages" placeholder="e.g. 320" min="0" />
    </div>
    <div class="field">
      <label id="progress-label">progress — 0%</label>
      <input type="range" id="f-progress" min="0" max="100" value="0"
        oninput="document.getElementById('progress-label').textContent = 'progress — ' + this.value + '%'" />
    </div>
    <div class="field">
      <label>notes</label>
      <textarea id="f-notes" rows="3" placeholder="thoughts, quotes, feelings..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-submit" id="btn-submit" onclick="submitForm()">add to log</button>
      <button class="btn-cancel" onclick="closeModal()">cancel</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'banana-books';
  let books = [], editId = null, activeFilter = 'all', nextId = 1;

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        books = JSON.parse(raw);
        nextId = Math.max(...books.map(b => b.id), 0) + 1;
      } else {
        books = [
          { id: 1, title: "Of Mice and Men", author: "John Steinbeck", genre: "fiction", status: "finished", progress: 100, totalPages: 107, notes: "heartbreaking and tragic", dateAdded: "2026-01-10" },
          { id: 2, title: "The Sun Also Rises", author: "Ernest Hemingway", genre: "fiction", status: "reading", progress: 65, totalPages: 250, notes: "", dateAdded: "2026-04-27" },
        ];
        nextId = 3; save();
      }
    } catch(e) { books = []; }
  }

  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(books)); }

  function setFilter(el) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    activeFilter = el.dataset.filter;
    render();
  }

  function ring(pct) {
    const size = 42, stroke = 3, r = (size - stroke) / 2;
    const circ = 2 * Math.PI * r;
    const offset = circ - (pct / 100) * circ;
    const color = pct === 100 ? '#2debd4' : '#b2ed3b';
    return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg);flex-shrink:0">
      <circle class="ring-bg" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}"/>
      <circle class="ring-fill" cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="${stroke}"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
    </svg>`;
  }

  function tagClass(s) {
    return { reading:'tag-reading', finished:'tag-finished', 'want to read':'tag-want', dropped:'tag-dropped' }[s] || '';
  }

  function render() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const sort   = document.getElementById('sort-select').value;
    let visible  = books
      .filter(b => activeFilter === 'all' || b.status === activeFilter)
      .filter(b => b.title.toLowerCase().includes(search) || (b.author||'').toLowerCase().includes(search));
    visible.sort((a,b) => {
      if (sort === 'dateAdded') return b.dateAdded.localeCompare(a.dateAdded);
      if (sort === 'title')     return a.title.localeCompare(b.title);
      if (sort === 'progress')  return b.progress - a.progress;
    });

    const list = document.getElementById('book-list');
    list.innerHTML = visible.length === 0
      ? '<div class="empty">no books here yet.</div>'
      : visible.map(b => {
          const pagesText = b.totalPages > 0
            ? `${b.status==='finished' ? b.totalPages : Math.round(b.totalPages * b.progress / 100)} / ${b.totalPages} pages`
            : '';
          return `<div class="book-card">
            ${ring(b.progress)}
            <div class="book-info">
              <div>
                <span class="book-title">${b.title}</span>
                ${b.author ? `<span class="book-author">by ${b.author}</span>` : ''}
              </div>
              <div class="book-meta">
                <span class="tag ${tagClass(b.status)}">${b.status}</span>
                ${b.genre ? `<span class="book-genre">${b.genre}</span>` : ''}
                ${pagesText ? `<span class="book-pages">${pagesText}</span>` : ''}
              </div>
              ${b.notes ? `<div class="book-notes">"${b.notes}"</div>` : ''}
            </div>
            <div class="book-actions">
              <button class="btn-sm" onclick="openEdit(${b.id})">edit</button>
              <button class="btn-sm del" onclick="deleteBook(${b.id})">✕</button>
            </div>
          </div>`;
        }).join('');

    document.getElementById('stat-total').textContent    = books.length;
    document.getElementById('stat-finished').textContent = books.filter(b=>b.status==='finished').length;
    document.getElementById('stat-reading').textContent  = books.filter(b=>b.status==='reading').length;
    document.getElementById('stat-pages').textContent    = books.reduce((s,b)=>s+(b.status==='finished'?(b.totalPages||0):0),0).toLocaleString();
  }

  function openModal() {
    editId = null;
    document.getElementById('modal-title').textContent  = 'add a book';
    document.getElementById('btn-submit').textContent   = 'add to log';
    document.getElementById('f-title').value    = '';
    document.getElementById('f-author').value   = '';
    document.getElementById('f-genre').value    = 'fiction';
    document.getElementById('f-status').value   = 'want to read';
    document.getElementById('f-pages').value    = '';
    document.getElementById('f-progress').value = 0;
    document.getElementById('progress-label').textContent = 'progress — 0%';
    document.getElementById('f-notes').value    = '';
    document.getElementById('overlay').classList.add('open');
    document.getElementById('f-title').focus();
  }

  function openEdit(id) {
    const b = books.find(x=>x.id===id); if (!b) return;
    editId = id;
    document.getElementById('modal-title').textContent  = 'edit book';
    document.getElementById('btn-submit').textContent   = 'save changes';
    document.getElementById('f-title').value    = b.title;
    document.getElementById('f-author').value   = b.author||'';
    document.getElementById('f-genre').value    = b.genre||'fiction';
    document.getElementById('f-status').value   = b.status;
    document.getElementById('f-pages').value    = b.totalPages||'';
    document.getElementById('f-progress').value = b.progress||0;
    document.getElementById('progress-label').textContent = 'progress — '+(b.progress||0)+'%';
    document.getElementById('f-notes').value    = b.notes||'';
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); }
  function handleOverlayClick(e) { if (e.target===document.getElementById('overlay')) closeModal(); }

  function submitForm() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }
    const entry = {
      title,
      author:     document.getElementById('f-author').value.trim(),
      genre:      document.getElementById('f-genre').value,
      status:     document.getElementById('f-status').value,
      totalPages: parseInt(document.getElementById('f-pages').value)||0,
      progress:   parseInt(document.getElementById('f-progress').value)||0,
      notes:      document.getElementById('f-notes').value.trim(),
    };
    if (editId !== null) {
      books = books.map(b => b.id===editId ? {...b,...entry} : b);
    } else {
      books.push({...entry, id: nextId++, dateAdded: new Date().toISOString().slice(0,10)});
    }
    save(); closeModal(); render();
  }

  function deleteBook(id) { books = books.filter(b=>b.id!==id); save(); render(); }

  load(); render();
</script>
</body>
</html>
